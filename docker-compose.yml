services:
  bot:
    build: .
    ports:
      - "7860:7860"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:7860/\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
